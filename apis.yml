  description: SOAP and OData web services for interacting with Dynamics NAV business data
  image: https://example.com/nav-webservices-icon.png
  humanUrl: https://docs.microsoft.com/en-us/dynamics-nav/web-services
  baseUrl: https://{server}:{port}/{instance}/api/{version}
