  - SOAP
  - Legacy
  - Integration
  - Business Logic
  properties:
  - type: Documentation
    url: https://docs.microsoft.com/en-us/dynamics-nav/soap-web-service-uris
  - type: WSDL
    url: https://{server}:{port}/{instance}/WS/Services?wsdl
