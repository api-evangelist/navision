  - SOAP
  - OData
  - Web Services
  - ERP
  properties:
  - type: Documentation
    url: https://docs.microsoft.com/en-us/dynamics-nav/web-services-overview
  - type: OpenAPI
    url: https://example.com/openapi/nav-webservices.yaml
  - type: Authentication
    url: https://docs.microsoft.com/en-us/dynamics-nav/authenticating-users-with-web-services
