  - OData
  - REST
  - Business Data
  - Queries
  properties:
  - type: Documentation
    url: https://docs.microsoft.com/en-us/dynamics-nav/odata-web-services
  - type: OpenAPI
    url: https://example.com/openapi/nav-odata.yaml
  - type: Examples
    url: https://docs.microsoft.com/en-us/dynamics-nav/walkthrough-creating-and-using-an-odata-web-service
  contact:
  - FN: Microsoft Support
    email: support@microsoft.com
- name: Dynamics NAV SOAP Web Services
  description: SOAP-based web services for legacy integrations and complex business logic operations
  image: https://example.com/soap-icon.png
  humanUrl: https://docs.microsoft.com/en-us/dynamics-nav/soap-web-services
