naftiko: 1.0.0-alpha2
info:
  label: Dynamics 365 Business Central API v2.0 — Item Categories
  description: 'Dynamics 365 Business Central API v2.0 — Item Categories. 1 operations. Lead operation: List Item Categories.
    Self-contained Naftiko capability covering one Navision business surface.'
  tags:
  - Navision
  - Item Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NAVISION_API_KEY: NAVISION_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-central-api-v2-item-categories
    baseUri: https://api.businesscentral.dynamics.com/v2.0/{environment}/api/v2.0
    description: Dynamics 365 Business Central API v2.0 — Item Categories business capability. Self-contained, no shared references.
    resources:
    - name: companies({company_id})-itemCategories
      path: /companies({company_id})/itemCategories
      operations:
      - name: listitemcategories
        method: GET
        description: List Item Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NAVISION_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-central-api-v2-item-categories-rest
    port: 8080
    description: REST adapter for Dynamics 365 Business Central API v2.0 — Item Categories. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/companies-company-id/itemcategories
      name: companies-company-id-itemcategories
      description: REST surface for companies({company_id})-itemCategories.
      operations:
      - method: GET
        name: listitemcategories
        description: List Item Categories
        call: business-central-api-v2-item-categories.listitemcategories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-central-api-v2-item-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dynamics 365 Business Central API v2.0 — Item Categories. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-item-categories
      description: List Item Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-central-api-v2-item-categories.listitemcategories
      outputParameters:
      - type: object
        mapping: $.
