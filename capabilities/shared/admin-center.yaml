naftiko: "1.0.0-alpha1"

info:
  label: "Business Central Administration Center API"
  description: "REST API for programmatic administration of Dynamics 365 Business Central environments, apps, notifications, storage, and updates."
  tags:
    - Business Central
    - Administration
    - Environment Management
    - Dynamics 365
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      BC_ADMIN_OAUTH_TOKEN: BC_ADMIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: admin-center
      baseUri: https://api.businesscentral.dynamics.com/admin/v2.28
      description: "Business Central Administration Center API for environment and tenant management."
      authentication:
        type: bearer
        token: "{{BC_ADMIN_OAUTH_TOKEN}}"
      resources:
        - name: environments
          path: /applications
          description: "Environment lifecycle management."
          operations:
            - name: list-all-environments
              method: GET
              description: "Returns all environments across all application families."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: list-environments
              method: GET
              description: "Returns environments for a specified application family."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family (e.g., BusinessCentral)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-environment
              method: GET
              description: "Returns properties for a specified environment."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-environment
              method: PUT
              description: "Creates a new environment."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              body:
                type: json
                data:
                  environmentType: "{{tools.environmentType}}"
                  countryCode: "{{tools.countryCode}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-environment
              method: DELETE
              description: "Soft deletes an environment."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: copy-environment
              method: POST
              description: "Creates a copy of an environment."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Source environment name"
              body:
                type: json
                data:
                  environmentName: "{{tools.targetName}}"
                  type: "{{tools.type}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: restore-environment
              method: POST
              description: "Restores an environment from a point in time."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              body:
                type: json
                data:
                  EnvironmentName: "{{tools.targetName}}"
                  PointInTime: "{{tools.pointInTime}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: list-installed-apps
              method: GET
              description: "Returns apps installed in an environment."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-environment-settings
              method: GET
              description: "Returns settings for an environment."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-environment-storage
              method: GET
              description: "Returns storage usage for an environment."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-scheduled-upgrade
              method: GET
              description: "Returns scheduled upgrade information."
              inputParameters:
                - name: applicationFamily
                  in: path
                  type: string
                  required: true
                  description: "Application family"
                - name: environmentName
                  in: path
                  type: string
                  required: true
                  description: "Environment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-quotas
              method: GET
              description: "Returns allowed quotas and limits."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: admin-center-api
      resources:
        - path: /v1/environments
          name: environments
          description: "Environment management"
          operations:
            - method: GET
              name: list-environments
              description: "List all environments"
              call: "admin-center.list-all-environments"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: admin-center-mcp
      transport: http
      tools:
        - name: list-all-environments
          description: "List all Business Central environments"
          hints:
            readOnly: true
            idempotent: true
          call: "admin-center.list-all-environments"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-environment
          description: "Get environment details"
          hints:
            readOnly: true
            idempotent: true
          call: "admin-center.get-environment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-environment
          description: "Create a new environment"
          hints:
            readOnly: false
          call: "admin-center.create-environment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-environment
          description: "Delete an environment"
          hints:
            readOnly: false
            destructive: true
          call: "admin-center.delete-environment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: copy-environment
          description: "Copy an environment"
          hints:
            readOnly: false
          call: "admin-center.copy-environment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: restore-environment
          description: "Restore an environment from a point in time"
          hints:
            readOnly: false
          call: "admin-center.restore-environment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-installed-apps
          description: "List installed apps in an environment"
          hints:
            readOnly: true
            idempotent: true
          call: "admin-center.list-installed-apps"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-environment-settings
          description: "Get environment settings"
          hints:
            readOnly: true
            idempotent: true
          call: "admin-center.get-environment-settings"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-environment-storage
          description: "Get environment storage usage"
          hints:
            readOnly: true
            idempotent: true
          call: "admin-center.get-environment-storage"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-scheduled-upgrade
          description: "Get scheduled upgrade information"
          hints:
            readOnly: true
            idempotent: true
          call: "admin-center.get-scheduled-upgrade"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-quotas
          description: "Get allowed quotas and limits"
          hints:
            readOnly: true
            idempotent: true
          call: "admin-center.get-quotas"
          outputParameters:
            - type: object
              mapping: "$."
