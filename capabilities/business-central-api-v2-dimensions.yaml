naftiko: 1.0.0-alpha2
info:
  label: Dynamics 365 Business Central API v2.0 — Dimensions
  description: 'Dynamics 365 Business Central API v2.0 — Dimensions. 1 operations. Lead operation: List Dimensions. Self-contained
    Naftiko capability covering one Navision business surface.'
  tags:
  - Navision
  - Dimensions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NAVISION_API_KEY: NAVISION_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-central-api-v2-dimensions
    baseUri: https://api.businesscentral.dynamics.com/v2.0/{environment}/api/v2.0
    description: Dynamics 365 Business Central API v2.0 — Dimensions business capability. Self-contained, no shared references.
    resources:
    - name: companies({company_id})-dimensions
      path: /companies({company_id})/dimensions
      operations:
      - name: listdimensions
        method: GET
        description: List Dimensions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NAVISION_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-central-api-v2-dimensions-rest
    port: 8080
    description: REST adapter for Dynamics 365 Business Central API v2.0 — Dimensions. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/companies-company-id/dimensions
      name: companies-company-id-dimensions
      description: REST surface for companies({company_id})-dimensions.
      operations:
      - method: GET
        name: listdimensions
        description: List Dimensions
        call: business-central-api-v2-dimensions.listdimensions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-central-api-v2-dimensions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dynamics 365 Business Central API v2.0 — Dimensions. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-dimensions
      description: List Dimensions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-central-api-v2-dimensions.listdimensions
      outputParameters:
      - type: object
        mapping: $.
