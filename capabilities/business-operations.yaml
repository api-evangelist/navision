naftiko: "1.0.0-alpha1"

info:
  label: "Dynamics NAV Business Operations"
  description: "Unified workflow for day-to-day business operations in Dynamics 365 Business Central combining the Business Central API v2.0 for managing customers, vendors, items, orders, invoices, and financials. Used by accountants, sales teams, and operations managers."
  tags:
    - Business Central
    - Dynamics 365
    - ERP
    - Finance
    - Sales
    - Purchasing
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      BC_OAUTH_TOKEN: BC_OAUTH_TOKEN

capability:
  consumes:
    - import: business-central-v2
      location: ./shared/business-central-v2.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: business-ops-api
      description: "Unified REST API for Business Central day-to-day business operations."
      resources:
        - path: /v1/companies
          name: companies
          description: "Company information"
          operations:
            - method: GET
              name: list-companies
              description: "List available companies"
              call: "business-central-v2.list-companies"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/customers
          name: customers
          description: "Customer management"
          operations:
            - method: GET
              name: list-customers
              description: "List all customers"
              call: "business-central-v2.list-customers"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-customer
              description: "Create a customer"
              call: "business-central-v2.create-customer"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/customers/{customer_id}
          name: customer
          description: "Single customer"
          operations:
            - method: GET
              name: get-customer
              description: "Get a customer"
              call: "business-central-v2.get-customer"
              with:
                company_id: "rest.company_id"
                customer_id: "rest.customer_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/vendors
          name: vendors
          description: "Vendor management"
          operations:
            - method: GET
              name: list-vendors
              description: "List all vendors"
              call: "business-central-v2.list-vendors"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/items
          name: items
          description: "Inventory items"
          operations:
            - method: GET
              name: list-items
              description: "List all items"
              call: "business-central-v2.list-items"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sales-orders
          name: sales-orders
          description: "Sales orders"
          operations:
            - method: GET
              name: list-sales-orders
              description: "List sales orders"
              call: "business-central-v2.list-sales-orders"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-sales-order
              description: "Create a sales order"
              call: "business-central-v2.create-sales-order"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/purchase-orders
          name: purchase-orders
          description: "Purchase orders"
          operations:
            - method: GET
              name: list-purchase-orders
              description: "List purchase orders"
              call: "business-central-v2.list-purchase-orders"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/accounts
          name: accounts
          description: "General ledger accounts"
          operations:
            - method: GET
              name: list-accounts
              description: "List accounts"
              call: "business-central-v2.list-accounts"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/journals
          name: journals
          description: "General journals"
          operations:
            - method: GET
              name: list-journals
              description: "List journals"
              call: "business-central-v2.list-journals"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sales-invoices
          name: sales-invoices
          description: "Sales invoices"
          operations:
            - method: GET
              name: list-sales-invoices
              description: "List sales invoices"
              call: "business-central-v2.list-sales-invoices"
              with:
                company_id: "rest.company_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9080
      namespace: business-ops-mcp
      transport: http
      description: "MCP server for AI-assisted Business Central business operations."
      tools:
        - name: list-companies
          description: "List available companies"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-companies"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-customers
          description: "List all customers"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-customers"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-customer
          description: "Create a new customer"
          hints:
            readOnly: false
          call: "business-central-v2.create-customer"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-customer
          description: "Get a customer by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.get-customer"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-vendors
          description: "List all vendors"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-vendors"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-vendor
          description: "Create a new vendor"
          hints:
            readOnly: false
          call: "business-central-v2.create-vendor"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-items
          description: "List inventory items"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-items"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-item
          description: "Create a new inventory item"
          hints:
            readOnly: false
          call: "business-central-v2.create-item"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-sales-orders
          description: "List all sales orders"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-sales-orders"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-sales-order
          description: "Create a new sales order"
          hints:
            readOnly: false
          call: "business-central-v2.create-sales-order"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-purchase-orders
          description: "List all purchase orders"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-purchase-orders"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-purchase-order
          description: "Create a new purchase order"
          hints:
            readOnly: false
          call: "business-central-v2.create-purchase-order"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-accounts
          description: "List general ledger accounts"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-journals
          description: "List general journals"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-journals"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-sales-invoices
          description: "List sales invoices"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-sales-invoices"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-purchase-invoices
          description: "List purchase invoices"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-purchase-invoices"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-employees
          description: "List all employees"
          hints:
            readOnly: true
            idempotent: true
          call: "business-central-v2.list-employees"
          outputParameters:
            - type: object
              mapping: "$."
