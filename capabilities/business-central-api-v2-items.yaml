    resources:
    - name: companies({company_id})-items
      path: /companies({company_id})/items
      operations:
      - name: listitems
        method: GET
        description: List Items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createitem
        method: POST
        description: Create an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: companies({company_id})-items({item_id})
      path: /companies({company_id})/items({item_id})
      operations:
      - name: getitem
        method: GET
        description: Get an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateitem
        method: PATCH
        description: Update an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
