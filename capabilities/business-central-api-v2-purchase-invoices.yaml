naftiko: 1.0.0-alpha2
info:
  label: Dynamics 365 Business Central API v2.0 — Purchase Invoices
  description: 'Dynamics 365 Business Central API v2.0 — Purchase Invoices. 2 operations. Lead operation: List Purchase Invoices.
    Self-contained Naftiko capability covering one Navision business surface.'
  tags:
  - Navision
  - Purchase Invoices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NAVISION_API_KEY: NAVISION_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-central-api-v2-purchase-invoices
    baseUri: https://api.businesscentral.dynamics.com/v2.0/{environment}/api/v2.0
    description: Dynamics 365 Business Central API v2.0 — Purchase Invoices business capability. Self-contained, no shared
      references.
    resources:
    - name: companies({company_id})-purchaseInvoices
      path: /companies({company_id})/purchaseInvoices
      operations:
      - name: listpurchaseinvoices
        method: GET
        description: List Purchase Invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createpurchaseinvoice
        method: POST
        description: Create a Purchase Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.NAVISION_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-central-api-v2-purchase-invoices-rest
    port: 8080
    description: REST adapter for Dynamics 365 Business Central API v2.0 — Purchase Invoices. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/companies-company-id/purchaseinvoices
      name: companies-company-id-purchaseinvoices
      description: REST surface for companies({company_id})-purchaseInvoices.
      operations:
      - method: GET
        name: listpurchaseinvoices
        description: List Purchase Invoices
        call: business-central-api-v2-purchase-invoices.listpurchaseinvoices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createpurchaseinvoice
        description: Create a Purchase Invoice
        call: business-central-api-v2-purchase-invoices.createpurchaseinvoice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-central-api-v2-purchase-invoices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dynamics 365 Business Central API v2.0 — Purchase Invoices. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-purchase-invoices
      description: List Purchase Invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-central-api-v2-purchase-invoices.listpurchaseinvoices
      outputParameters:
      - type: object
        mapping: $.
    - name: create-purchase-invoice
      description: Create a Purchase Invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: business-central-api-v2-purchase-invoices.createpurchaseinvoice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
