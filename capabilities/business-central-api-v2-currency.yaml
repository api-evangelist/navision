naftiko: 1.0.0-alpha2
info:
  label: Dynamics 365 Business Central API v2.0 — Currency
  description: 'Dynamics 365 Business Central API v2.0 — Currency. 1 operations. Lead operation: List Currencies. Self-contained
    Naftiko capability covering one Navision business surface.'
  tags:
  - Navision
  - Currency
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NAVISION_API_KEY: NAVISION_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-central-api-v2-currency
    baseUri: https://api.businesscentral.dynamics.com/v2.0/{environment}/api/v2.0
    description: Dynamics 365 Business Central API v2.0 — Currency business capability. Self-contained, no shared references.
    resources:
    - name: companies({company_id})-currencies
      path: /companies({company_id})/currencies
      operations:
      - name: listcurrencies
        method: GET
        description: List Currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NAVISION_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-central-api-v2-currency-rest
    port: 8080
    description: REST adapter for Dynamics 365 Business Central API v2.0 — Currency. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/companies-company-id/currencies
      name: companies-company-id-currencies
      description: REST surface for companies({company_id})-currencies.
      operations:
      - method: GET
        name: listcurrencies
        description: List Currencies
        call: business-central-api-v2-currency.listcurrencies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-central-api-v2-currency-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dynamics 365 Business Central API v2.0 — Currency. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-currencies
      description: List Currencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-central-api-v2-currency.listcurrencies
      outputParameters:
      - type: object
        mapping: $.
