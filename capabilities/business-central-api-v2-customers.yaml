    description: Dynamics 365 Business Central API v2.0 — Customers business capability. Self-contained, no shared references.
    resources:
    - name: companies({company_id})-customers
      path: /companies({company_id})/customers
      operations:
      - name: listcustomers
        method: GET
        description: List Customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcustomer
        method: POST
        description: Create a Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: companies({company_id})-customers({customer_id})
      path: /companies({company_id})/customers({customer_id})
      operations:
      - name: getcustomer
        method: GET
        description: Get a Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecustomer
        method: PATCH
        description: Update a Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
