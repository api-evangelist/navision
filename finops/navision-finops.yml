description: 'FOCUS-aligned FinOps for Microsoft Dynamics NAV / Dynamics 365 Business Central: per-seat
  subscription billing across Essentials, Premium, and Team Members SKUs with annual commitment, plus
  metered Microsoft Copilot Credits.'
sources:
  - https://www.microsoft.com/en-us/dynamics-365/products/business-central/pricing
  - https://learn.microsoft.com/en-us/dynamics365/business-central/dev-itpro/administration/operational-limits-online
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: ERP
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Microsoft Dynamics 365 Business Central
  ServiceCategory: ERP
  ServiceSubcategory: Business Management
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  PricingCategory: Subscription
  PricingUnit: seat-month
meters:
  - name: essentials_seats
    description: Number of Essentials full-user seats licensed.
    unit: seat-month
    aggregation: sum
    dimensions:
      - tenant
      - environment
  - name: premium_seats
    description: Number of Premium full-user seats licensed.
    unit: seat-month
    aggregation: sum
    dimensions:
      - tenant
      - environment
  - name: team_member_seats
    description: Number of limited-access Team Members seats licensed.
    unit: seat-month
    aggregation: sum
    dimensions:
      - tenant
      - environment
  - name: copilot_credits
    description: Microsoft Copilot Credits consumed by AI agents inside Business Central.
    unit: credit
    aggregation: sum
    dimensions:
      - tenant
      - agent
  - name: environments
    description: Provisioned production and sandbox environments per tenant.
    unit: environment-month
    aggregation: avg
    dimensions:
      - tenant
      - type
  - name: storage
    description: Compressed environment database storage (cap 3 TB per environment).
    unit: GB-month
    aggregation: avg
    dimensions:
      - tenant
      - environment
principles:
  - name: Visibility
    description: Use the Microsoft 365 admin center, Dynamics 365 admin center, and the Business Central
      Telemetry data in Application Insights to attribute seat consumption, environment counts, and Copilot
      Credit burn.
  - name: Allocation
    description: Map seat assignments and environments to cost centers via Microsoft Entra (Azure AD)
      groups and license assignment policies; tag custom AL extensions and integrations by department.
  - name: Optimization
    description: Right-size SKU mix — use Team Members ($8) for read/approval-only users instead of full
      Essentials/Premium seats; consolidate environments where possible; meter Copilot adoption before
      committing credit packs; spread API load across multiple users to avoid throttling-driven retries.
  - name: Accountability
    description: Tie annual seat commitments to department headcount forecasts; set Copilot Credit budget
      alerts; review unused seats quarterly; review API throttling telemetry to ensure integrations stay
      within per-user limits.
maintainers:
