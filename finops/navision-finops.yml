specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Microsoft Dynamics NAV
providerId: navision
publisherName: Microsoft Dynamics NAV
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Business Management
  - Dynamics NAV
  - ERP
  - Finance
  - Inventory
  - Microsoft
  - Navision
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Microsoft Dynamics NAV API surface. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Microsoft Dynamics NAV
  ServiceCategory: Developer Tools / API
  ProviderName: Microsoft Dynamics NAV
  PublisherName: Microsoft Dynamics NAV
  InvoiceIssuerName: Microsoft Dynamics NAV
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Dynamics NAV Web Services API
    baseURL: https://{server}:{port}/{instance}/api/{version}
    tags:
      - Enterprise Resource Planning
      - OData
      - SOAP
      - Web Services
    serviceName: Dynamics NAV Web Services API
    serviceCategory: API
  - name: Dynamics NAV OData API
    baseURL: https://{server}:{port}/{instance}/OData/Company('{company}')
    tags:
      - Business Data
      - Data Integration
      - OData
      - Queries
    serviceName: Dynamics NAV OData API
    serviceCategory: API
  - name: Dynamics NAV SOAP Web Services
    baseURL: https://{server}:{port}/{instance}/WS/{company}/
    tags:
      - Business Logic
      - Codeunits
      - Legacy Integration
      - SOAP
    serviceName: Dynamics NAV SOAP Web Services
    serviceCategory: API
  - name: Business Central API v2.0
    baseURL: https://api.businesscentral.dynamics.com/v2.0/{environment}/api/v2.0
    tags:
      - Business Central
      - Business Data
      - Cloud ERP
      - Connect Apps
      - REST API
    serviceName: Business Central API v2.0
    serviceCategory: API
  - name: Business Central Administration Center API
    baseURL: https://api.businesscentral.dynamics.com/admin/v2.28
    tags:
      - Administration
      - Cloud ERP
      - Environment Management
      - Tenant Management
    serviceName: Business Central Administration Center API
    serviceCategory: API
  - name: Business Central Automation API
    baseURL: https://api.businesscentral.dynamics.com/v2.0/{environment}/api/microsoft/automation/v2.0
    tags:
      - Automation
      - Extension Management
      - Tenant Management
      - User Management
    serviceName: Business Central Automation API
    serviceCategory: API
  - name: Business Central REST API Web Services
    baseURL: https://api.businesscentral.dynamics.com/v2.0/{environment}/api
    tags:
      - Business Central
      - Custom APIs
      - Data Integration
      - REST API
      - Web Services
    serviceName: Business Central REST API Web Services
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
